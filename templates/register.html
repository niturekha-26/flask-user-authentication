<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <form method="POST">
        <h2>Register</h2>

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        ><br><br>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        ><br><br>

        <button type="submit">Create Account</button>

    </form>

</body>
</html>
