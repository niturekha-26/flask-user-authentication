<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <form method="POST">
        <h2>Login</h2>

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        ><br><br>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        ><br><br>

        <button type="submit">Login</button>

    </form>

</body>
</html>
